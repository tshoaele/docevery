<!DOCTYPE html>
<html lang="en" class="h-full bg-zinc-950 text-zinc-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = { content: [], theme: { extend: {} } }
    </script>
    <style>
        .entry-card { transition: all 0.2s; }
        .entry-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3); }
    </style>
</head>
<body class="h-full flex flex-col">
    <div class="flex h-full">
        <!-- Sidebar -->
        <div class="w-64 bg-zinc-900 border-r border-zinc-800 flex flex-col">
            <div class="p-6 border-b border-zinc-800">
                <h1 class="text-2xl font-bold flex items-center gap-2"><span class="text-emerald-400">📖</span> WorkVault</h1>
                <p class="text-xs text-zinc-500 mt-1">Document everything</p>
            </div>
            
            <div class="flex-1 overflow-auto p-3">
                <button onclick="switchView('dashboard')" class="w-full text-left px-4 py-3 hover:bg-zinc-800 rounded-xl flex items-center gap-3 text-sm font-medium"><i class="fa-solid fa-house w-5"></i> Dashboard</button>
                <button onclick="switchView('inbox')" class="w-full text-left px-4 py-3 hover:bg-zinc-800 rounded-xl flex items-center gap-3 text-sm font-medium"><i class="fa-solid fa-inbox w-5"></i> Inbox</button>
                <button onclick="switchView('tasks')" class="w-full text-left px-4 py-3 hover:bg-zinc-800 rounded-xl flex items-center gap-3 text-sm font-medium"><i class="fa-solid fa-list-check w-5"></i> Tasks</button>
                <button onclick="switchView('notes')" class="w-full text-left px-4 py-3 hover:bg-zinc-800 rounded-xl flex items-center gap-3 text-sm font-medium"><i class="fa-solid fa-note-sticky w-5"></i> Notes</button>
                <button onclick="switchView('meetings')" class="w-full text-left px-4 py-3 hover:bg-zinc-800 rounded-xl flex items-center gap-3 text-sm font-medium"><i class="fa-solid fa-users w-5"></i> Meetings</button>
                
                <div class="mt-8 px-4 text-xs uppercase tracking-widest text-zinc-500 mb-2">PARA</div>
                <button onclick="switchView('para')" class="w-full text-left px-4 py-3 hover:bg-zinc-800 rounded-xl flex items-center gap-3 text-sm font-medium"><i class="fa-solid fa-folder w-5"></i> Projects / Areas / Resources / Archives</button>
            </div>
            
            <div class="p-4 border-t border-zinc-800">
                <button onclick="showAddModal()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl py-3 font-semibold flex items-center justify-center gap-2">
                    <i class="fa-solid fa-plus"></i> New Entry
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col">
            <!-- Top bar -->
            <div class="h-14 border-b border-zinc-800 bg-zinc-900 flex items-center px-6 justify-between">
                <div class="flex items-center gap-4 flex-1">
                    <input id="searchInput" onkeyup="handleSearch(event)" placeholder="Search everything..." class="bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-2 w-96 focus:outline-none focus:border-emerald-500">
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="mockAI()" class="px-4 py-2 text-sm bg-zinc-800 hover:bg-zinc-700 rounded-2xl flex items-center gap-2"><i class="fa-solid fa-sparkles text-amber-400"></i> Ask AI</button>
                    <div class="w-8 h-8 bg-zinc-700 rounded-full flex items-center justify-center text-sm font-bold">JD</div>
                </div>
            </div>

            <!-- View Container -->
            <div id="mainView" class="flex-1 overflow-auto p-8">
                <!-- Content injected by JS -->
            </div>
        </div>
    </div>

    <!-- Add Modal -->
    <div id="addModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-lg mx-4">
            <div class="p-6 border-b border-zinc-700 flex justify-between">
                <h2 class="text-xl font-semibold">New Entry</h2>
                <button onclick="hideAddModal()" class="text-zinc-400 hover:text-white">✕</button>
            </div>
            <div class="p-6 space-y-6">
                <select id="entryType" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3">
                    <option value="note">Note</option>
                    <option value="task">Task</option>
                    <option value="meeting">Meeting</option>
                </select>
                <input id="entryTitle" placeholder="Title" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3">
                <textarea id="entryContent" placeholder="Details / notes..." rows="6" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-5 py-3"></textarea>
                <input id="entryContext" placeholder="Project or Area (e.g. Q2 Campaign)" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3">
                <div class="flex gap-3">
                    <button onclick="saveEntry()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-3 rounded-2xl font-semibold">Save</button>
                    <button onclick="hideAddModal()" class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-3 rounded-2xl">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let entries = JSON.parse(localStorage.getItem('workvault_entries')) || [];
        let currentView = 'dashboard';
        let currentFilter = '';

        function saveToStorage() {
            localStorage.setItem('workvault_entries', JSON.stringify(entries));
        }

        function renderView(view) {
            currentView = view;
            const container = document.getElementById('mainView');
            let html = '';

            const filtered = currentFilter 
                ? entries.filter(e => e.title.toLowerCase().includes(currentFilter) || e.content.toLowerCase().includes(currentFilter))
                : entries;

            if (view === 'dashboard') {
                const recent = [...filtered].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 6);
                const openTasks = filtered.filter(e => e.type === 'task' && !e.completed);
                html = `
                    <h1 class="text-4xl font-bold mb-2">Good morning, colleague 👋</h1>
                    <p class="text-zinc-400 mb-10">Here's what's happening at work today.</p>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-zinc-900 rounded-3xl p-6">
                            <h3 class="text-emerald-400 font-medium mb-4">Recent Activity</h3>
                            ${recent.map(e => `<div class="py-3 border-b border-zinc-800 last:border-0 flex justify-between"><span>${e.title}</span><span class="text-xs text-zinc-500">${new Date(e.date).toLocaleDateString()}</span></div>`).join('')}
                        </div>
                        <div class="bg-zinc-900 rounded-3xl p-6">
                            <h3 class="text-amber-400 font-medium mb-4">Open Tasks (${openTasks.length})</h3>
                            ${openTasks.slice(0,5).map(e => `<div class="flex items-center gap-3 py-2"><input type="checkbox" onchange="toggleComplete(${e.id})" class="accent-emerald-500"> <span>${e.title}</span></div>`).join('')}
                        </div>
                        <div class="bg-zinc-900 rounded-3xl p-6 text-center flex flex-col justify-center">
                            <p class="text-6xl font-bold text-emerald-400">${entries.length}</p>
                            <p class="text-zinc-400">Total entries captured</p>
                            <button onclick="showAddModal()" class="mt-6 mx-auto bg-white text-zinc-900 px-8 py-3 rounded-2xl font-semibold">Capture something new</button>
                        </div>
                    </div>
                `;
            } else if (view === 'tasks') {
                const tasks = filtered.filter(e => e.type === 'task');
                html = `<h2 class="text-2xl font-semibold mb-6">Tasks</h2><div class="space-y-3">` +
                    tasks.map(e => `
                        <div class="entry-card bg-zinc-900 rounded-3xl p-5 flex items-center gap-4">
                            <input type="checkbox" ${e.completed ? 'checked' : ''} onchange="toggleComplete(${e.id})" class="accent-emerald-500 w-5 h-5">
                            <div class="flex-1">
                                <div class="font-medium">${e.title}</div>
                                <div class="text-xs text-zinc-500">${e.content.substring(0,80)}${e.content.length > 80 ? '...' : ''}</div>
                            </div>
                            <div class="text-xs bg-zinc-800 px-3 py-1 rounded-full">${e.context || 'No project'}</div>
                        </div>
                    `).join('') + `</div>`;
            } else {
                // Generic list for notes, meetings, inbox, para
                const listItems = filtered.filter(e => {
                    if (view === 'notes') return e.type === 'note';
                    if (view === 'meetings') return e.type === 'meeting';
                    if (view === 'inbox') return !e.context;
                    return true;
                });
                html = `<h2 class="text-2xl font-semibold mb-6">${view.charAt(0).toUpperCase() + view.slice(1)}</h2>` +
                    listItems.map(e => `
                        <div class="entry-card bg-zinc-900 rounded-3xl p-6 mb-4">
                            <div class="flex justify-between">
                                <div>
                                    <span class="uppercase text-[10px] tracking-widest bg-zinc-800 px-3 py-1 rounded-full">${e.type}</span>
                                    <h3 class="font-semibold text-lg mt-2">${e.title}</h3>
                                </div>
                                <div class="text-right text-xs text-zinc-500">${new Date(e.date).toLocaleDateString()}</div>
                            </div>
                            <p class="text-zinc-400 mt-3 line-clamp-3">${e.content}</p>
                            ${e.context ? `<div class="mt-4 text-xs inline-block bg-emerald-900 text-emerald-300 px-4 py-1 rounded-2xl">${e.context}</div>` : ''}
                        </div>
                    `).join('');
            }
            container.innerHTML = html || '<p class="text-zinc-500">No entries yet. Add some!</p>';
        }

        function switchView(view) {
            currentFilter = '';
            document.getElementById('searchInput').value = '';
            renderView(view);
        }

        function handleSearch(e) {
            currentFilter = e.target.value.toLowerCase().trim();
            renderView(currentView);
        }

        function showAddModal() {
            document.getElementById('addModal').classList.remove('hidden');
            document.getElementById('entryTitle').focus();
        }

        function hideAddModal() {
            document.getElementById('addModal').classList.add('hidden');
        }

        function saveEntry() {
            const type = document.getElementById('entryType').value;
            const title = document.getElementById('entryTitle').value.trim() || 'Untitled';
            const content = document.getElementById('entryContent').value.trim();
            const context = document.getElementById('entryContext').value.trim();

            if (!title) return;

            entries.unshift({
                id: Date.now(),
                date: new Date().toISOString(),
                type: type,
                title: title,
                content: content,
                context: context,
                completed: type === 'task' ? false : null
            });

            saveToStorage();
            hideAddModal();
            renderView(currentView);
        }

        function toggleComplete(id) {
            const entry = entries.find(e => e.id === id);
            if (entry) {
                entry.completed = !entry.completed;
                saveToStorage();
                renderView(currentView);
            }
        }

        function mockAI() {
            alert("🤖 AI Summary (demo):\n\nKey themes from your recent entries:\n• Several action items around the Q2 Campaign\n• Meeting with marketing team highlighted budget approval\n\nWould you like me to extract tasks or generate a weekly report?");
            // In full version, this would call Grok API or similar with your entries data
        }

        // Add some sample data on first load
        if (entries.length === 0) {
            entries = [
                {id: 1, date: "2026-02-08T09:00:00Z", type: "meeting", title: "Weekly Team Sync", content: "Discussed Q2 goals. Action: Finalize budget by Friday.", context: "Q2 Campaign"},
                {id: 2, date: "2026-02-07T14:30:00Z", type: "task", title: "Prepare client presentation", content: "Include last quarter metrics.", context: "Client Relations", completed: false},
                {id: 3, date: "2026-02-06T11:15:00Z", type: "note", title: "Idea: New onboarding checklist", content: "Automate welcome emails and access grants.", context: "Team Leadership"}
            ];
            saveToStorage();
        }

        // Initial render
        renderView('dashboard');
    </script>
</body>
</html>
